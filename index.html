<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cat Combat: Ultimate Edition</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --accent: #f6ad55;
            --accent-glow: rgba(246, 173, 85, 0.25);
            --neon-blue: #00f0ff;
            --text-main: #ffffff;
            --text-sub: #c5a880;
            --green: #4ecca3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        .game-window {
            width: 100%; max-width: 390px; height: 100vh;
            background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f16 100%);
            position: relative; display: flex; flex-direction: column; box-sizing: border-box; padding: 15px;
        }

        /* Экран загрузки */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f16; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #fff;
        }
        .loader-logo { font-size: 70px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .loader-title { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: 3px; margin-bottom: 5px; }
        .loader-sub { font-size: 13px; color: #718096; margin-bottom: 30px; }
        .progress-box { width: 70%; background: #1a1a2e; height: 10px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--accent)); border-radius: 10px; transition: width 0.1s linear; }
        .time-counter { font-size: 11px; color: #718096; margin-top: 10px; font-family: monospace; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Верхняя панель */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-weight: bold; color: #fff; font-size: 13px; }
        .morse-indicator { font-size: 11px; color: #718096; letter-spacing: 1px; font-family: monospace; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; }
        .stat-card.morse-active { border-color: #ff3333; box-shadow: 0 0 10px rgba(255,51,51,0.5); }
        .stat-label { font-size: 10px; color: #718096; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: #fff; margin-top: 2px; }

        /* Главный Экран */
        .screen { display: none; flex-direction: column; align-items: center; flex: 1; overflow-y: auto; padding-bottom: 70px; }
        .screen.active { display: flex; }

        .combo-container { display: flex; gap: 8px; width: 90%; margin-bottom: 10px; justify-content: center; }
        .combo-slot { width: 45px; height: 45px; background: var(--panel-bg); border-radius: 8px; border: 1px dashed #4a5568; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .combo-slot.guessed { border-color: var(--green); background: rgba(78,204,163,0.1); }

        .balance-container { margin: 10px 0; display: flex; align-items: center; gap: 8px; }
        .coin-img { width: 40px; height: 40px; }
        .balance-value { font-size: 40px; font-weight: 800; color: #fff; }

        .cat-zone { position: relative; width: 220px; height: 220px; margin: 10px 0; display: flex; align-items: center; justify-content: center; }
        .cat-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; }
        .cat-img { width: 190px; height: 190px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; z-index: 2; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        .cat-img:active { transform: scale(0.94); }
        .cat-img.red-glow { border-color: #ff3333; }

        .energy-container { width: 90%; margin-top: 10px; }
        .energy-info { display: flex; justify-content: space-between; font-size: 12px; color: #fff; }
        .energy-bar { width: 100%; height: 8px; background: #1a1a2e; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f6ad55, #ed8936); transition: width 0.1s linear; }

        /* Списки Апгрейдов */
        .upgrade-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .card { background: var(--panel-bg); border-radius: 14px; padding: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid rgba(255,255,255,0.02); }
        .card-inner { display: flex; align-items: center; gap: 12px; }
        .card-icon { width: 40px; height: 40px; border-radius: 10px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .card-title { font-size: 14px; font-weight: bold; color: #fff; }
        .card-profit { font-size: 11px; color: var(--green); margin-top: 2px; }
        .card-lvl { font-size: 11px; color: #718096; }
        .card-price { font-size: 13px; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 3px; }

        /* Вкладки Рефералов и Дейликов */
        .invite-box { background: var(--panel-bg); padding: 15px; border-radius: 14px; width: 90%; text-align: center; margin-bottom: 15px; }
        .share-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .grid-7 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-top: 10px; }
        .day-card { background: var(--panel-bg); padding: 10px 5px; border-radius: 8px; text-align: center; color: #718096; font-size: 11px; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .day-card.claimed { background: rgba(78,204,163,0.1); border-color: var(--green); color: #fff; }
        .day-card.current { border-color: var(--neon-blue); color: #fff; }

        /* Нижний Навбар */
        .navbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background: #0f0f16; display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #718096; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 18px; margin-bottom: 3px; }

        /* Текст вылетающих кликов */
        .floating-text { position: absolute; color: #fff; font-size: 26px; font-weight: 900; text-shadow: 0 2px 4px #000; pointer-events: none; animation: floatUp 0.4s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }
    </style>
</head>
<body>

    <!-- ЭКРАН СМАРТ-ЗАГРУЗКИ -->
    <div id="loading-screen">
        <div class="loader-logo">😼</div>
        <div class="loader-title">CAT COMBAT</div>
        <div class="loader-sub">Загрузка кошачьей крипто-биржи...</div>
        <div class="progress-box"><div class="progress-fill" id="load-fill"></div></div>
        <div class="time-counter" id="load-time">Осталось: 3.0 сек</div>
    </div>

    <div class="game-window">
        <!-- Верхний статус -->
        <div class="top-bar">
            <div class="user-info">🐱 Кот-Инвестор (Ранг 1)</div>
            <div class="morse-indicator" id="morseCode">МОРЗЕ: ВЫКЛ</div>
        </div>

        <!-- Сетка прибыли -->
        <div class="stats-grid">
            <div class="stat-card" id="pfcCard" onclick="triggerMorseClick()">
                <div class="stat-label">За клик</div>
                <div class="stat-value">🪙 +<span id="pfc">1</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Прибыль в час</div>
                <div class="stat-value" style="color: var(--green);">+<span id="piph">0</span></div>
            </div>
        </div>

        <!-- ЭКРАН 1: ТАПЕР -->
        <div class="screen active" id="scr-tap">
            <div class="combo-container">
                <div class="combo-slot" id="combo-0">❓</div>
                <div class="combo-slot" id="combo-1">❓</div>
                <div class="combo-slot" id="combo-2">❓</div>
            </div>
            <div class="balance-container">
                <img src="https://icons8.com" class="coin-img" alt="coin">
                <div class="balance-value" id="balance">0</div>
            </div>
            <div class="cat-zone">
                <div class="cat-bg"></div>
                <img src="https://unsplash.com" class="cat-img" id="catBtn" alt="cat">
            </div>
            <div class="energy-container">
                <div class="energy-info"><span>⚡ Энергия</span><span id="energyText">1000 / 1000</span></div>
                <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
            </div>
        </div>
